version: '3.8'

services:
  mongodb:
    image: mongo:6-jammy
    container_name: flavorz-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: flavorz_town
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - flavorz-network

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: flavorz-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4500
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/flavorz_town?authSource=admin
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-your_super_secret_access_key_change_this}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your_super_secret_refresh_key_change_this}
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      FRONTEND_URL: http://localhost
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 100
      COOKIE_SECURE: false
      COOKIE_HTTP_ONLY: true
      COOKIE_SAME_SITE: strict
    ports:
      - "4500:4500"
    depends_on:
      - mongodb
    networks:
      - flavorz-network

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: flavorz-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:4500/api/v1
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - flavorz-network

volumes:
  mongodb_data:
    driver: local

networks:
  flavorz-network:
    driver: bridge
